services:
  - type: web
    name: seismosense-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.10"
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: seismosense-frontend
          type: web
          property: host

  - type: web
    name: seismosense-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: seismosense-api
          type: web
          property: host
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "3000"
